# /opt/llama_alwaysOn/docker-compose.yml
# Models that are always on
name: llama-core
services:
  # EMBED – RAG / PDF / Semantic Search
  llama-embed:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2
    restart: unless-stopped
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "44"
      - "992"
    volumes:
      - /opt/models/embed:/models:ro
    ports:
      - "8085:8085"
    environment:
      - HSA_ENABLE_SDMA=0
    command: >
      llama-server
      --model /models/mxbai-embed-large.gguf
      --port 8085
      --host 0.0.0.0
      --n-gpu-layers 99
      --ctx-size 1000
      --parallel 4
      --embeddings
      --no-mmap
      --pooling cls

  # Fast (for Chat folow questions or Chat name Generation)
  llama-nano:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2
    restart: unless-stopped
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "44"
      - "992"
    volumes:
      - /opt/models/nano:/models:ro
    ports:
      - "8086:8086"
    environment:
      - HSA_ENABLE_SDMA=0
    command: >
      llama-server
      --model /models/Llama-3.2-3B-Instruct-IQ4_XS.gguf
      --port 8086
      --host 0.0.0.0
      --n-gpu-layers 99
      --ctx-size 8192
      --threads 4
      --parallel 4
      --flash-attn auto

  # Code Autocomplete
  llama-autocomplete:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2
    restart: unless-stopped
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "44"
      - "992"
    volumes:
      - /opt/models/autocomplete:/models:ro
    ports:
      - "8088:8088"
    environment:
      - HSA_ENABLE_SDMA=0
    command: >
      llama-server
      --model /models/qwen2.5-coder-1.5b-instruct-q4_k_m.gguf
      --port 8088
      --host 0.0.0.0
      --n-gpu-layers 99
      --ctx-size 4096
      --parallel 4
      --no-mmap
      --flash-attn auto

  # Image description
  llama-vision:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2
    restart: unless-stopped
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "44"
      - "992"
    volumes:
      - /opt/models/vision:/models:ro
    ports:
      - "8089:8089"
    environment:
      - HSA_ENABLE_SDMA=0
    command: >
      llama-server
      --model /models/Qwen2.5-VL-7B-Instruct-Q4_K_M.gguf
      --mmproj /models/mmproj-Qwen2.5-VL-7B-Instruct-Q8_0.gguf
      --port 8089
      --host 0.0.0.0
      --n-gpu-layers 99
      --ctx-size 8192
      --parallel 1
      --no-mmap
      --flash-attn auto